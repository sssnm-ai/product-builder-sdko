<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>로또 번호 추첨기</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <button id="theme-toggle">다크 모드</button>
    <div class="container">
        <h1>로또 번호 추첨기</h1>
        <div id="numbers" class="numbers-container"></div>
        <button id="generate-btn">번호 생성</button>

        <div class="contact-form">
            <hr>
            <h3>제휴 문의</h3>
            <form action="https://formspree.io/f/xnjgkopb" method="POST">
                <input type="email" name="email" placeholder="이메일 주소" required>
                <textarea name="message" placeholder="문의 내용" required></textarea>
                <button type="submit">문의하기</button>
            </form>
        </div>
    </div>
    <script src="main.js"></script>
</body>
</html>
